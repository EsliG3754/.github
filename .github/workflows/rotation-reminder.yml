name: rotation-reminder

# Crea un Issue trimestral en ESLIMX/.github con checklist de rotación de secrets.
# El issue es el sistema de tracking — cerrarlo = rotación completa.
#
# Cron: 1 de enero/abril/julio/octubre a 9am UTC (3am-4am Mexico)

on:
  schedule:
    - cron: "0 9 1 */3 *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  open-rotation-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Open quarterly rotation issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          QUARTER="$(date -u +%Y-Q%-q | sed 's/Q1/Q1/;s/Q2/Q2/;s/Q3/Q3/;s/Q4/Q4/')"
          # macOS no tiene %-q, fallback en runner ubuntu sí
          QUARTER="$(date -u +%Y-Q$(( ($(date -u +%-m) - 1) / 3 + 1 )))"
          TITLE="ops: rotación de secrets — $QUARTER"

          # Si ya existe un issue abierto con ese título, no crear duplicado
          EXISTING=$(gh issue list --repo ${{ github.repository }} --search "$TITLE in:title is:open" --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING ya existe para $QUARTER, skip."
            exit 0
          fi

          gh issue create \
            --repo ${{ github.repository }} \
            --title "$TITLE" \
            --label "ops,rotation,recurring" \
            --body "$(cat <<'BODY'
          # Rotación trimestral de secrets

          **Procedimiento detallado**: ver [OPS.md §4.2](../blob/main/OPS.md#42-procedimiento-por-tipo-de-secret).

          Marca cada item al completar la rotación. Cerrar este issue solo cuando los 4 deploys de prueba post-rotación hayan pasado.

          ## Cadencia 90 días (cada quarter)

          - [ ] **`PROD_SSH_KEY`** — generar nueva ed25519, añadir al VPS, actualizar GitHub Secret en los 4 repos, deploy de prueba, eliminar la vieja
          - [ ] **`GHCR_PULL_TOKEN`** — generar PAT con `read:packages`, validar `docker login`, actualizar en los 4 repos, deploy de prueba, revocar vieja

          ## Cadencia 180 días (semestral — solo si han pasado >= 6 meses)

          - [ ] **`NEXTAUTH_SECRET`** (portal y react) — coordinar (rota sesiones)
          - [ ] **`KARIO_HANDOFF_SECRET`** (compartido kario+portal) — coordinar (rota handoffs activos)
          - [ ] **`KAIRO_KEY_WEB`/`_CLIENTS`/`_HUBWELL`** — los 3 al mismo tiempo, en kario y en cada caller
          - [ ] **`KAIRO_ADMIN_KEY`** (kario) — opcional
          - [ ] **`JWT_SECRET`** y **`JWT_CLIENT_SECRET`** (react/api) — coordinar (rota sesiones)

          ## Cadencia 365 días (anual — solo en Q1 de cada año)

          - [ ] **`RESEND_API_KEY`** (portal y logwellv2)
          - [ ] **`TURNSTILE_SECRET_KEY`** (logwellv2 y portal)
          - [ ] **`BANXICO_TOKEN`** (logwellv2)

          ## Verificación post-rotación

          - [ ] Los 4 sitios responden HTTP 2xx/3xx después de los re-deploys:
            - https://logwell.mx
            - https://clientes.logwell.mx
            - https://hub.logwell.mx
            - https://kairo.logwell.mx/health
          - [ ] Notificación a Telegram funcionando (deploy posteó al canal)
          - [ ] Issue cerrado con resumen de rotaciones realizadas

          ---

          🤖 Issue generado automáticamente por `.github/workflows/rotation-reminder.yml`. Se vuelve a abrir cada trimestre.
          BODY
          )"
