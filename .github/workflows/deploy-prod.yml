name: deploy-prod (reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: "Nombre de la imagen GHCR (ej: logwellv2, hubwell-portal, hubwell-api, kario)"
        required: true
        type: string
      vps_path:
        description: "Ruta absoluta del stack en el VPS (ej: /srv/logwellv2)"
        required: true
        type: string
      service_name:
        description: "Nombre del servicio en compose.prod.yml (ej: web, portal, api)"
        required: false
        default: "web"
        type: string
      container_name:
        description: "container_name del servicio (ej: logwellv2_prod)"
        required: true
        type: string
      version_env_var:
        description: "Nombre de la env var que compose espera (ej: WEB_VERSION, PORTAL_VERSION)"
        required: true
        type: string
      health_url:
        description: "URL pública para smoke test (ej: https://logwell.mx)"
        required: true
        type: string
      environment_name:
        description: "Nombre del environment en GitHub (default: production)"
        required: false
        default: "production"
        type: string
      dockerfile:
        description: "Path al Dockerfile (default: Dockerfile)"
        required: false
        default: "Dockerfile"
        type: string
      docker_context:
        description: "Build context (default: .)"
        required: false
        default: "."
        type: string
      compose_file:
        description: "Path al compose file (relativo al repo y al vps_path). Default: compose.prod.yml"
        required: false
        default: "compose.prod.yml"
        type: string
      check_hubwell_network:
        description: "Verificar que la red hubwell_network exista en el VPS"
        required: false
        default: true
        type: boolean
      validate_env:
        description: "Validar .env del VPS contra .env.prod.example antes del up. Si falta una var, abortar deploy SIN tirar container previo."
        required: false
        default: true
        type: boolean
      env_example_path:
        description: "Path al .env example en el repo (default .env.prod.example)"
        required: false
        default: ".env.prod.example"
        type: string
      env_vps_path:
        description: "Path al .env real en el VPS (default <vps_path>/.env)"
        required: false
        default: ""
        type: string
      kill_host_ports:
        description: "Antes del up, matar cualquier container que ocupe estos host:port (coma-separado, ej '127.0.0.1:3004,0.0.0.0:8080'). Útil cuando un deploy previo dejó fantasmas con nombre distinto al esperado."
        required: false
        default: ""
        type: string
      smoke_test_mode:
        description: "Modo de smoke test post-deploy: 'public' (curl al health_url), 'internal' (docker run en network interna), 'none'"
        required: false
        default: "public"
        type: string
      smoke_internal_url:
        description: "Cuando smoke_test_mode=internal, URL HTTP a probar desde la red docker (ej http://kario:3004/health)"
        required: false
        default: ""
        type: string
      smoke_internal_network:
        description: "Nombre de red docker para smoke interno"
        required: false
        default: "hubwell_network"
        type: string
      run_migrations:
        description: "Ejecutar prisma migrate deploy antes del up"
        required: false
        default: false
        type: boolean
      backup_before_migrate:
        description: "Hacer pg_dump antes de migrate (requiere run_migrations=true)"
        required: false
        default: true
        type: boolean
      wait_max_seconds:
        description: "Tiempo máximo a esperar a que el container llegue a healthy (segundos)"
        required: false
        default: 90
        type: number
      wait_grace_period_seconds:
        description: "Espera inicial antes del primer check de healthy (segundos)"
        required: false
        default: 0
        type: number
      timeout_minutes_build:
        description: "Timeout del job de build (minutos)"
        required: false
        default: 25
        type: number
      timeout_minutes_deploy:
        description: "Timeout del job de deploy (minutos)"
        required: false
        default: 15
        type: number
    secrets:
      PROD_SSH_KEY:
        required: true
      PROD_HOST:
        required: true
      PROD_USER:
        required: true
      GHCR_PULL_USER:
        required: true
      GHCR_PULL_TOKEN:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
    outputs:
      version:
        description: "Tag inmutable de la imagen desplegada (YYYYMMDD-HHMMSS-shortSHA)"
        value: ${{ jobs.resolve.outputs.version }}
      image_url:
        description: "URL completa de la imagen GHCR"
        value: ${{ jobs.resolve.outputs.image_url }}

permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  resolve:
    name: Resolver ref + tag
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.out.outputs.ref }}
      sha: ${{ steps.out.outputs.sha }}
      version: ${{ steps.out.outputs.version }}
      owner_lc: ${{ steps.out.outputs.owner_lc }}
      image_url: ${{ steps.out.outputs.image_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
      - id: out
        run: |
          REF="${{ github.ref_name }}"
          SHA="$(git rev-parse --short HEAD)"
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          OWNER_LC="$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')"
          VERSION="${STAMP}-${SHA}"
          IMAGE_URL="${{ env.REGISTRY }}/${OWNER_LC}/${{ inputs.image_name }}:${VERSION}"
          {
            echo "ref=$REF"
            echo "sha=$SHA"
            echo "version=$VERSION"
            echo "owner_lc=$OWNER_LC"
            echo "image_url=$IMAGE_URL"
          } >> "$GITHUB_OUTPUT"

  build-image:
    name: Build & push ${{ inputs.image_name }}
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes_build }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - uses: docker/setup-buildx-action@v4

      - name: Login a GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/${{ inputs.image_name }}:${{ needs.resolve.outputs.version }}
            ${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/${{ inputs.image_name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/${{ inputs.image_name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/${{ inputs.image_name }}:buildcache,mode=max
          build-args: |
            APP_VERSION=${{ needs.resolve.outputs.version }}

  deploy:
    name: Deploy → VPS (${{ inputs.health_url }})
    needs: [resolve, build-image]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes_deploy }}
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.health_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Preparar SSH
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          HOST: ${{ secrets.PROD_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sincronizar compose file al VPS
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          VPS_PATH: ${{ inputs.vps_path }}
          COMPOSE_FILE: ${{ inputs.compose_file }}
        run: |
          REMOTE_DIR="$VPS_PATH/$(dirname "$COMPOSE_FILE")"
          ssh "$USER@$HOST" "mkdir -p '$REMOTE_DIR'"
          scp "$COMPOSE_FILE" "$USER@$HOST:$VPS_PATH/$COMPOSE_FILE"

      - name: Validar .env del VPS contra .env.prod.example
        if: ${{ inputs.validate_env }}
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          VPS_PATH: ${{ inputs.vps_path }}
          ENV_EXAMPLE: ${{ inputs.env_example_path }}
          ENV_VPS_OVERRIDE: ${{ inputs.env_vps_path }}
        run: |
          if [ ! -f "$ENV_EXAMPLE" ]; then
            echo "::warning::No existe $ENV_EXAMPLE en el repo, skip validación del .env"
            exit 0
          fi

          # Determinar path real del .env en el VPS
          if [ -n "$ENV_VPS_OVERRIDE" ]; then
            ENV_VPS_PATH="$ENV_VPS_OVERRIDE"
          else
            ENV_VPS_PATH="$VPS_PATH/.env"
          fi

          # Subir el example a /tmp del VPS para validar
          scp "$ENV_EXAMPLE" "$USER@$HOST:/tmp/_env_validation_example"

          ssh "$USER@$HOST" bash -se <<EOF
          set -euo pipefail

          if [ ! -f "$ENV_VPS_PATH" ]; then
            echo "::error::No existe $ENV_VPS_PATH en el VPS"
            rm -f /tmp/_env_validation_example
            exit 1
          fi

          # Extraer keys REQUERIDAS del example (con valor != vacío después del =)
          # Lógica: VAR=foo → requerida (el example da el valor recomendado)
          #         VAR=    → opcional (el example dice "define si quieres")
          REQUIRED_KEYS=\$(grep -E '^[A-Z_][A-Z0-9_]*=.+' /tmp/_env_validation_example | cut -d= -f1 | sort -u)
          ALL_EXAMPLE_KEYS=\$(grep -E '^[A-Z_][A-Z0-9_]*=' /tmp/_env_validation_example | cut -d= -f1 | sort -u)
          # Extraer keys del .env real (con sudo porque es 600)
          ENV_KEYS=\$(sudo grep -E '^[A-Z_][A-Z0-9_]*=' "$ENV_VPS_PATH" | cut -d= -f1 | sort -u)

          # Vars REQUERIDAS en example pero NO en real → ERROR
          MISSING_REQUIRED=\$(comm -23 <(echo "\$REQUIRED_KEYS") <(echo "\$ENV_KEYS") || true)
          if [ -n "\$MISSING_REQUIRED" ]; then
            echo "::error::Vars REQUERIDAS del $ENV_EXAMPLE que FALTAN en $ENV_VPS_PATH:"
            echo "\$MISSING_REQUIRED" | sed 's/^/  - /'
            echo "::error::Añade los valores reales en $ENV_VPS_PATH del VPS antes de re-deployar."
            echo "::error::Deploy abortado SIN tocar el container previo (zero downtime en error)."
            rm -f /tmp/_env_validation_example
            exit 1
          fi

          # Vars OPCIONALES (con = vacío en example) que faltan → solo notice
          MISSING_OPTIONAL=\$(comm -23 <(echo "\$ALL_EXAMPLE_KEYS") <(echo "\$ENV_KEYS") | comm -23 - <(echo "\$REQUIRED_KEYS") || true)
          if [ -n "\$MISSING_OPTIONAL" ]; then
            echo "::notice::Vars opcionales del $ENV_EXAMPLE no definidas en $ENV_VPS_PATH (skip):"
            echo "\$MISSING_OPTIONAL" | sed 's/^/  - /'
          fi

          # Vars con placeholders comunes → WARNING (no aborta)
          PLACEHOLDERS=\$(sudo grep -EH '^[A-Z_][A-Z0-9_]*=(change-me|changeme|xxx|XXX|TODO|todo|placeholder|PLACEHOLDER|<.*>|""|'\'\'')$' "$ENV_VPS_PATH" || true)
          if [ -n "\$PLACEHOLDERS" ]; then
            echo "::warning::Vars con valor placeholder en $ENV_VPS_PATH (cambiar en producción):"
            echo "\$PLACEHOLDERS" | sed 's/^/  /'
          fi

          # Vars en real pero no en example → solo informativo
          EXTRA=\$(comm -13 <(echo "\$EXAMPLE_KEYS") <(echo "\$ENV_KEYS") || true)
          if [ -n "\$EXTRA" ]; then
            echo "::notice::Vars en $ENV_VPS_PATH no documentadas en $ENV_EXAMPLE (legacy o overrides locales):"
            echo "\$EXTRA" | sed 's/^/  - /'
          fi

          echo "✅ Validación .env OK — todas las vars requeridas presentes"
          rm -f /tmp/_env_validation_example
          EOF

      - name: Backup DB pre-migrate (opcional)
        if: ${{ inputs.run_migrations && inputs.backup_before_migrate }}
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          VPS_PATH: ${{ inputs.vps_path }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          ssh "$USER@$HOST" bash -se <<EOF
          set -euo pipefail
          BACKUP_DIR="/srv/backups/${IMAGE_NAME}"
          mkdir -p "\$BACKUP_DIR"
          STAMP="\$(date -u +%Y%m%d-%H%M%S)"
          cd "${VPS_PATH}"
          # Asume que el compose tiene el servicio "db" y que .env tiene POSTGRES_*
          if docker compose -f compose.prod.yml ps db --format json 2>/dev/null | grep -q '"State":"running"'; then
            docker compose -f compose.prod.yml exec -T db pg_dumpall -U "\${POSTGRES_USER:-postgres}" \
              | gzip > "\$BACKUP_DIR/\${STAMP}.sql.gz"
            echo "Backup en \$BACKUP_DIR/\${STAMP}.sql.gz"
            # Retención 30 días
            find "\$BACKUP_DIR" -name "*.sql.gz" -mtime +30 -delete
          else
            echo "::notice::Servicio db no está running en este stack, skip backup"
          fi
          EOF

      - name: Pull imagen + (migrate) + deploy ${{ inputs.service_name }}
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          GHCR_PULL_USER: ${{ secrets.GHCR_PULL_USER }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          VERSION: ${{ needs.resolve.outputs.version }}
          VERSION_ENV_VAR: ${{ inputs.version_env_var }}
          SERVICE: ${{ inputs.service_name }}
          CONTAINER: ${{ inputs.container_name }}
          VPS_PATH: ${{ inputs.vps_path }}
          COMPOSE_FILE: ${{ inputs.compose_file }}
          CHECK_NETWORK: ${{ inputs.check_hubwell_network }}
          KILL_HOST_PORTS: ${{ inputs.kill_host_ports }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
          WAIT_MAX_SECONDS: ${{ inputs.wait_max_seconds }}
          WAIT_GRACE_PERIOD: ${{ inputs.wait_grace_period_seconds }}
        run: |
          ssh "$USER@$HOST" bash -se <<EOF
          set -euo pipefail
          cd "${VPS_PATH}"

          if [ ! -f .env ]; then
            echo "::error::Falta ${VPS_PATH}/.env en el VPS (ver .env.prod.example)."
            exit 1
          fi

          if [ "${CHECK_NETWORK}" = "true" ]; then
            if ! docker network inspect hubwell_network >/dev/null 2>&1; then
              echo "::error::La red 'hubwell_network' no existe en el VPS."
              exit 1
            fi
          fi

          echo "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GHCR_PULL_USER}" --password-stdin

          # Pre-up: matar containers fantasma que ocupen los host ports declarados.
          # Necesario cuando un deploy previo dejó un container en restart loop con
          # nombre distinto al actual (ej kario tras un crash + restart de docker).
          # Acepta formatos "127.0.0.1:3004" o "3004" — extrae solo el puerto para el filter.
          if [ -n "${KILL_HOST_PORTS}" ]; then
            IFS=',' read -ra PORTS <<< "${KILL_HOST_PORTS}"
            for port_spec in "\${PORTS[@]}"; do
              port_spec=\$(echo "\$port_spec" | xargs)
              # Extraer puerto numérico (después del último ":" o el spec entero)
              port_num=\$(echo "\$port_spec" | rev | cut -d: -f1 | rev)
              echo "▶ Verificando puerto \$port_num (spec: \$port_spec)..."

              echo "  docker ps -a --filter publish=\$port_num:"
              docker ps -a --filter "publish=\$port_num" --format 'table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}' || true

              COLLIDING=\$(docker ps -aq --filter "publish=\$port_num" 2>/dev/null || true)
              if [ -n "\$COLLIDING" ]; then
                echo "::warning::Containers ocupando puerto \$port_num: \$COLLIDING — limpiando"
                docker rm -f \$COLLIDING 2>&1 | sed 's/^/  /' || true
              fi

              # Si tras limpiar containers el puerto sigue ocupado, mostrar qué proceso lo tiene.
              # No matamos procesos del host automáticamente (peligroso); solo informamos.
              if command -v ss >/dev/null 2>&1; then
                LISTENERS=\$(ss -tlnp 2>/dev/null | grep ":\$port_num " || true)
                if [ -n "\$LISTENERS" ]; then
                  echo "::warning::Puerto \$port_num sigue con listeners (no-docker?):"
                  echo "\$LISTENERS" | sed 's/^/  /'
                fi
              fi
            done
          fi

          export ${VERSION_ENV_VAR}="${VERSION}"
          docker compose -f "${COMPOSE_FILE}" pull "${SERVICE}"

          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            echo "▶ Ejecutando prisma migrate deploy..."
            docker compose -f "${COMPOSE_FILE}" run --rm "${SERVICE}" npx prisma migrate deploy || {
              echo "::error::Migrate falló. NO se subirá la nueva imagen. Revisa backup en /srv/backups/."
              exit 1
            }
          fi

          # Flags clave:
          # --no-deps: NUNCA recrea otros services del compose (defensa explícita).
          # --remove-orphans: limpia containers del MISMO project que ya no están en el compose.
          # --force-recreate: fuerza recreación del service aunque el config no haya cambiado.
          #   Necesario porque sin él, si un container previo entró en restart loop y quedó
          #   ocupando puerto del host (ej kario:127.0.0.1:3004), el up nuevo falla con
          #   "port is already allocated". --force-recreate lo detiene primero.
          docker compose -f "${COMPOSE_FILE}" up -d --no-deps --force-recreate --remove-orphans "${SERVICE}"

          if [ "${WAIT_GRACE_PERIOD}" -gt 0 ]; then
            echo "Grace period inicial: ${WAIT_GRACE_PERIOD}s antes del primer check..."
            sleep "${WAIT_GRACE_PERIOD}"
          fi

          MAX_ITER=\$(( ${WAIT_MAX_SECONDS} / 3 ))
          for i in \$(seq 1 \$MAX_ITER); do
            state=\$(docker inspect -f '{{.State.Status}}' "${CONTAINER}" 2>/dev/null || echo "missing")
            health=\$(docker inspect -f '{{.State.Health.Status}}' "${CONTAINER}" 2>/dev/null || echo "no-healthcheck")
            echo "wait[\$i/\$MAX_ITER] state=\$state health=\$health"
            if [ "\$state" = "running" ] && { [ "\$health" = "healthy" ] || [ "\$health" = "no-healthcheck" ]; }; then
              echo "✅ Container ${CONTAINER} healthy"
              break
            fi
            if [ "\$i" -eq "\$MAX_ITER" ]; then
              echo "::error::Container ${CONTAINER} no llegó a healthy en ${WAIT_MAX_SECONDS}s"
              echo "--- docker ps --filter name=${CONTAINER} ---"
              docker ps -a --filter "name=${CONTAINER}" --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.RunningFor}}'
              echo "--- docker compose logs --tail=200 ---"
              docker compose -f "${COMPOSE_FILE}" logs --tail=200 "${SERVICE}"
              exit 1
            fi
            sleep 3
          done

          docker image prune -f
          EOF

      - name: Smoke test público
        if: ${{ inputs.smoke_test_mode == 'public' }}
        env:
          HEALTH_URL: ${{ inputs.health_url }}
        run: |
          set -e
          for i in 1 2 3 4 5 6; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if echo "$code" | grep -q "^[23]"; then
              echo "✅ $HEALTH_URL OK (HTTP $code)"; exit 0
            fi
            echo "intento $i: HTTP $code, reintentando..."
            sleep 10
          done
          echo "::error::$HEALTH_URL no responde con 2xx/3xx tras el deploy"
          exit 1

      - name: Smoke test interno (red docker)
        if: ${{ inputs.smoke_test_mode == 'internal' }}
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          INTERNAL_URL: ${{ inputs.smoke_internal_url }}
          NETWORK: ${{ inputs.smoke_internal_network }}
        run: |
          if [ -z "$INTERNAL_URL" ]; then
            echo "::error::smoke_test_mode=internal requiere smoke_internal_url"
            exit 1
          fi
          ssh "$USER@$HOST" "docker run --rm --network $NETWORK curlimages/curl:8.9.1 -fsS '$INTERNAL_URL'"

      - name: Resumen
        if: always()
        env:
          STATUS: ${{ job.status }}
          VERSION: ${{ needs.resolve.outputs.version }}
          IMAGE: ${{ needs.resolve.outputs.image_url }}
          HEALTH: ${{ inputs.health_url }}
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`$IMAGE\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: $HEALTH" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notificar Telegram
    needs: [resolve, deploy]
    if: always() && (success() || failure())
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ needs.deploy.result }}
          VERSION: ${{ needs.resolve.outputs.version }}
          IMAGE: ${{ inputs.image_name }}
          HEALTH: ${{ inputs.health_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          set -e
          if [ -z "$BOT" ] || [ -z "$CHAT" ]; then
            echo "Telegram secrets no configurados, skip notificación."
            exit 0
          fi
          if [ "$STATUS" = "success" ]; then
            EMOJI="🚀"
            STATUS_TEXT="✅ success"
          else
            EMOJI="🔥"
            STATUS_TEXT="❌ failed"
          fi
          MSG="$EMOJI *Deploy ${IMAGE} → prod*%0A%0A*Version*: \`${VERSION}\`%0A*URL*: ${HEALTH}%0A*Status*: ${STATUS_TEXT}%0A*Por*: @${ACTOR}%0A%0A[Ver run](https://github.com/${REPO}/actions/runs/${RUN_ID})"
          curl -fsS "https://api.telegram.org/bot${BOT}/sendMessage" \
            -d "chat_id=${CHAT}" \
            -d "parse_mode=Markdown" \
            -d "text=${MSG}" > /dev/null
