name: deploy-prod (reusable)

# Workflow reutilizable para deploy a producción.
#
# Soporta dos modos:
#   - Single-image (compat con portal/v2/kario): usa `image_name` + `service_name` + `container_name` directos.
#   - Multi-image (hub): usa `images_json` con un array de imágenes que se buildean en matrix y se despliegan juntas.
#
# Versionado:
#   - Push a un tag git (ref_type=tag): VERSION = nombre del tag (ej. v1.45.0).
#   - Push a una rama: VERSION = YYYYMMDD-HHMMSS-shortSHA.
#   - workflow_dispatch con input `version_override`: override explícito.
#
# `:latest` se mueve en cada deploy. El TAG inmutable es el identificador estable.

on:
  workflow_call:
    inputs:
      # ── Single-image inputs (modo compat) ──
      image_name:
        description: "Nombre de la imagen GHCR para single-image (ej: logwellv2, hubwell-portal). Ignorado si images_json está definido."
        required: false
        default: ""
        type: string
      service_name:
        description: "Nombre del servicio en compose (single-image). Default: web."
        required: false
        default: "web"
        type: string
      container_name:
        description: "container_name (single-image). Required si images_json no está definido."
        required: false
        default: ""
        type: string
      dockerfile:
        description: "Path al Dockerfile (single-image). Default: Dockerfile."
        required: false
        default: "Dockerfile"
        type: string
      docker_context:
        description: "Build context (single-image). Default: ."
        required: false
        default: "."
        type: string

      # ── Multi-image input (modo monorepo) ──
      images_json:
        description: |
          JSON array para multi-image. Si está vacío, se usa el modo single-image desde los inputs de arriba.
          Esquema por item: {image_name, dockerfile, docker_context, service_name, container_name}.
          Cada item se buildea como matrix y su service_name/container_name se incluye en pull/up/wait.
          Ejemplo:
            [
              {"image_name":"hubwell-api","dockerfile":"apps/api/Dockerfile","docker_context":"apps/api","service_name":"api-1","container_name":"hubwell_api_1_prod"},
              {"image_name":"hubwell-web","dockerfile":"apps/web/Dockerfile","docker_context":"apps/web","service_name":"web","container_name":"hubwell_web_prod"}
            ]
        required: false
        default: ""
        type: string

      additional_services_json:
        description: |
          JSON array de servicios EXTRA que ya comparten imagen con alguno de images_json y se redespliegan pero NO se buildean.
          Esquema por item: {service_name, container_name}.
          Útil para stacks que tienen replicas/workers que reusan la imagen del API.
          Ejemplo (hub): la imagen hubwell-api la usan api-1, api-2 y worker; api-1 va en images_json y api-2/worker aquí:
            [
              {"service_name":"api-2","container_name":"hubwell_api_2_prod"},
              {"service_name":"worker","container_name":"hubwell_worker_prod"}
            ]
        required: false
        default: ""
        type: string

      # ── Stack / VPS ──
      vps_path:
        description: "Ruta absoluta del stack en el VPS (ej: /srv/logwellv2)"
        required: true
        type: string
      version_env_var:
        description: "Nombre de la env var que compose espera (ej: WEB_VERSION, PORTAL_VERSION, HUBWELL_VERSION)"
        required: true
        type: string
      compose_file:
        description: "Path al compose file relativo a vps_path EN EL VPS. Default: compose.prod.yml"
        required: false
        default: "compose.prod.yml"
        type: string
      compose_repo_path:
        description: |
          Path al compose file EN EL REPO (relativo a la raíz del repo).
          Si vacío, se asume el mismo que compose_file.
          Útil para monorepos donde el compose vive en un subdir distinto a vps_path.
          Ejemplo: repo en root, dashboard/compose.prod.yml → vps_path=/srv/.../dashboard,
                   compose_file=compose.prod.yml, compose_repo_path=dashboard/compose.prod.yml.
        required: false
        default: ""
        type: string
      check_hubwell_network:
        description: "Verificar que la red hubwell_network exista en el VPS"
        required: false
        default: true
        type: boolean

      # ── Versionado ──
      version_override:
        description: "Override explícito de la versión (ej. desde workflow_dispatch input). Si vacío, se autocalcula."
        required: false
        default: ""
        type: string

      # ── Environment / .env validation ──
      environment_name:
        description: "Nombre del environment en GitHub (default: production)"
        required: false
        default: "production"
        type: string
      validate_env:
        description: "Validar .env del VPS contra .env.prod.example antes del up. Si falta una var, abortar deploy SIN tirar container previo."
        required: false
        default: true
        type: boolean
      env_example_path:
        description: "Path al .env example en el repo (default .env.prod.example)"
        required: false
        default: ".env.prod.example"
        type: string
      env_vps_path:
        description: "Path al .env real en el VPS (default <vps_path>/.env)"
        required: false
        default: ""
        type: string

      # ── Migrations ──
      run_migrations:
        description: "Ejecutar migrations antes del up del resto de servicios."
        required: false
        default: false
        type: boolean
      migrate_service:
        description: "Service que corre las migrations. Default = service_name (single-image) o primer service de images_json (multi)."
        required: false
        default: ""
        type: string
      migrate_command:
        description: "Comando para correr migrations (ej. 'npx prisma migrate deploy', 'pnpm exec prisma migrate deploy')"
        required: false
        default: "npx prisma migrate deploy"
        type: string
      backup_before_migrate:
        description: "Hacer pg_dump antes de migrate (requiere run_migrations=true)"
        required: false
        default: true
        type: boolean
      forbid_db_services:
        description: "GUARDRAIL: abortar el deploy SIN tocar nada si el compose declara un servicio Postgres. La BD debe ser EXTERNA (no gestionada por el deploy de apps). Recomendado true en stacks con BD externa."
        required: false
        default: false
        type: boolean

      # ── Operacional ──
      kill_host_ports:
        description: "Antes del up, matar containers que ocupen estos host:port (coma-separado). Útil para limpiar fantasmas."
        required: false
        default: ""
        type: string
      wait_max_seconds:
        description: "Tiempo máximo a esperar a que todos los containers lleguen a healthy (segundos)"
        required: false
        default: 90
        type: number
      wait_grace_period_seconds:
        description: "Espera inicial antes del primer check de healthy (segundos)"
        required: false
        default: 0
        type: number
      timeout_minutes_build:
        description: "Timeout del job de build (minutos)"
        required: false
        default: 25
        type: number
      timeout_minutes_deploy:
        description: "Timeout del job de deploy (minutos)"
        required: false
        default: 15
        type: number

      # ── Smoke tests ──
      health_url:
        description: "URL pública principal para smoke test (ej: https://logwell.mx). También se publica como environment URL."
        required: true
        type: string
      smoke_urls:
        description: "URLs adicionales para smoke (coma-separadas). Cada una debe responder 2xx/3xx. Si vacío, solo se prueba health_url."
        required: false
        default: ""
        type: string
      smoke_test_mode:
        description: "'public' (curl al health_url + smoke_urls), 'internal' (docker run en network), 'none'"
        required: false
        default: "public"
        type: string
      smoke_internal_url:
        description: "Cuando smoke_test_mode=internal, URL HTTP a probar desde la red docker"
        required: false
        default: ""
        type: string
      smoke_internal_network:
        description: "Nombre de red docker para smoke interno"
        required: false
        default: "hubwell_network"
        type: string
    secrets:
      PROD_SSH_KEY:
        required: true
      PROD_HOST:
        required: true
      PROD_USER:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
      # PAT con read:packages para resolver paquetes privados de GitHub Packages
      # publicados en OTRO repo de la org (p. ej. @eslimx/* desde
      # ESLIMX/logwell_cotizaciones). El GITHUB_TOKEN automático solo lee paquetes
      # del propio repo, así que para cross-repo privado hace falta este PAT.
      # Opcional: si no se setea, el build cae al GITHUB_TOKEN (sirve para
      # paquetes públicos o del mismo repo). Se consume como secret de BuildKit
      # 'github_token' (ver el RUN --mount=type=secret,id=github_token del Dockerfile).
      PACKAGES_READ_TOKEN:
        required: false
    outputs:
      version:
        description: "Tag inmutable de la imagen desplegada"
        value: ${{ jobs.resolve.outputs.version }}
      images_json:
        description: "Array de imágenes normalizadas (JSON)"
        value: ${{ jobs.resolve.outputs.images_json }}

permissions:
  contents: read
  packages: write
  deployments: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  resolve:
    name: Resolver ref, version, images
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.out.outputs.ref }}
      sha: ${{ steps.out.outputs.sha }}
      version: ${{ steps.out.outputs.version }}
      owner_lc: ${{ steps.out.outputs.owner_lc }}
      images_json: ${{ steps.out.outputs.images_json }}
      migrate_service: ${{ steps.out.outputs.migrate_service }}
      all_services: ${{ steps.out.outputs.all_services }}
      all_containers: ${{ steps.out.outputs.all_containers }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
      - id: out
        env:
          INPUT_IMAGES_JSON: ${{ inputs.images_json }}
          INPUT_IMAGE_NAME: ${{ inputs.image_name }}
          INPUT_DOCKERFILE: ${{ inputs.dockerfile }}
          INPUT_DOCKER_CONTEXT: ${{ inputs.docker_context }}
          INPUT_SERVICE_NAME: ${{ inputs.service_name }}
          INPUT_CONTAINER_NAME: ${{ inputs.container_name }}
          INPUT_MIGRATE_SERVICE: ${{ inputs.migrate_service }}
          INPUT_VERSION_OVERRIDE: ${{ inputs.version_override }}
          INPUT_ADDITIONAL_SERVICES_JSON: ${{ inputs.additional_services_json }}
          GH_REF_TYPE: ${{ github.ref_type }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          REF="$GH_REF_NAME"
          SHA="$(git rev-parse --short HEAD)"
          OWNER_LC="$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')"

          # ── Resolver VERSION ──
          if [ -n "$INPUT_VERSION_OVERRIDE" ]; then
            VERSION="$INPUT_VERSION_OVERRIDE"
          elif [ "$GH_REF_TYPE" = "tag" ]; then
            # Tag deploy → la versión es el tag exacto (ej. v1.45.0)
            VERSION="$GH_REF_NAME"
          else
            # Push a rama o dispatch sin override → date-shortsha
            VERSION="$(date -u +%Y%m%d-%H%M%S)-${SHA}"
          fi

          # ── Normalizar IMAGES ──
          if [ -n "$INPUT_IMAGES_JSON" ]; then
            # Multi-image: usar el JSON tal cual (validar con jq)
            IMAGES=$(echo "$INPUT_IMAGES_JSON" | jq -c .)
          else
            # Single-image: construir el JSON desde los inputs singletons
            if [ -z "$INPUT_IMAGE_NAME" ] || [ -z "$INPUT_CONTAINER_NAME" ]; then
              echo "::error::Modo single-image requiere image_name y container_name (o pasar images_json para multi-image)"
              exit 1
            fi
            IMAGES=$(jq -nc \
              --arg img "$INPUT_IMAGE_NAME" \
              --arg df "$INPUT_DOCKERFILE" \
              --arg ctx "$INPUT_DOCKER_CONTEXT" \
              --arg svc "$INPUT_SERVICE_NAME" \
              --arg ctr "$INPUT_CONTAINER_NAME" \
              '[{image_name: $img, dockerfile: $df, docker_context: $ctx, service_name: $svc, container_name: $ctr}]')
          fi

          # ── Resolver MIGRATE_SERVICE ──
          if [ -n "$INPUT_MIGRATE_SERVICE" ]; then
            MIGRATE_SVC="$INPUT_MIGRATE_SERVICE"
          else
            # Default: primer service del array
            MIGRATE_SVC=$(echo "$IMAGES" | jq -r '.[0].service_name')
          fi

          # ── Resolver lista combinada de services/containers (images + additional) ──
          PRIMARY_SVCS=$(echo "$IMAGES" | jq -r '[.[].service_name] | join(" ")')
          PRIMARY_CTRS=$(echo "$IMAGES" | jq -r '[.[].container_name] | join(" ")')
          if [ -n "$INPUT_ADDITIONAL_SERVICES_JSON" ]; then
            EXTRA=$(echo "$INPUT_ADDITIONAL_SERVICES_JSON" | jq -c .)
            EXTRA_SVCS=$(echo "$EXTRA" | jq -r '[.[].service_name] | join(" ")')
            EXTRA_CTRS=$(echo "$EXTRA" | jq -r '[.[].container_name] | join(" ")')
            ALL_SVCS="${PRIMARY_SVCS} ${EXTRA_SVCS}"
            ALL_CTRS="${PRIMARY_CTRS} ${EXTRA_CTRS}"
          else
            ALL_SVCS="$PRIMARY_SVCS"
            ALL_CTRS="$PRIMARY_CTRS"
          fi

          {
            echo "ref=$REF"
            echo "sha=$SHA"
            echo "version=$VERSION"
            echo "owner_lc=$OWNER_LC"
            echo "images_json=$IMAGES"
            echo "migrate_service=$MIGRATE_SVC"
            echo "all_services=$ALL_SVCS"
            echo "all_containers=$ALL_CTRS"
          } >> "$GITHUB_OUTPUT"

          echo "── resumen ──"
          echo "REF=$REF  SHA=$SHA  VERSION=$VERSION  OWNER=$OWNER_LC"
          echo "MIGRATE_SVC=$MIGRATE_SVC"
          echo "IMAGES=$IMAGES"
          echo "ALL_SVCS=$ALL_SVCS"
          echo "ALL_CTRS=$ALL_CTRS"

  build-images:
    name: Build & push ${{ matrix.img.image_name }}
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes_build }}
    strategy:
      fail-fast: true
      matrix:
        img: ${{ fromJSON(needs.resolve.outputs.images_json) }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - uses: docker/setup-buildx-action@v4

      - name: Login a GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.img.image_name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.img.docker_context }}
          file: ${{ matrix.img.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/${{ matrix.img.image_name }}:${{ needs.resolve.outputs.version }}
            ${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/${{ matrix.img.image_name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/${{ matrix.img.image_name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/${{ matrix.img.image_name }}:buildcache,mode=max
          build-args: |
            APP_VERSION=${{ needs.resolve.outputs.version }}
          # Token para resolver paquetes privados de GitHub Packages durante
          # `npm ci` en el Dockerfile (RUN --mount=type=secret,id=github_token).
          # Usa el PAT cross-repo si se proveyó; si no, cae al GITHUB_TOKEN.
          secrets: |
            github_token=${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy → VPS (${{ inputs.health_url }})
    needs: [resolve, build-images]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes_deploy }}
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.health_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Preparar SSH
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          HOST: ${{ secrets.PROD_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sincronizar compose file al VPS
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          VPS_PATH: ${{ inputs.vps_path }}
          COMPOSE_FILE: ${{ inputs.compose_file }}
          COMPOSE_REPO_PATH: ${{ inputs.compose_repo_path }}
        run: |
          # Source en el repo: compose_repo_path si está, si no el mismo compose_file.
          SOURCE="${COMPOSE_REPO_PATH:-$COMPOSE_FILE}"
          REMOTE_DIR="$VPS_PATH/$(dirname "$COMPOSE_FILE")"
          ssh "$USER@$HOST" "mkdir -p '$REMOTE_DIR'"
          scp "$SOURCE" "$USER@$HOST:$VPS_PATH/$COMPOSE_FILE"

      - name: Validar .env del VPS contra .env.prod.example
        if: ${{ inputs.validate_env }}
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          VPS_PATH: ${{ inputs.vps_path }}
          ENV_EXAMPLE: ${{ inputs.env_example_path }}
          ENV_VPS_OVERRIDE: ${{ inputs.env_vps_path }}
        run: |
          if [ ! -f "$ENV_EXAMPLE" ]; then
            echo "::warning::No existe $ENV_EXAMPLE en el repo, skip validación del .env"
            exit 0
          fi

          # Determinar path real del .env en el VPS
          if [ -n "$ENV_VPS_OVERRIDE" ]; then
            ENV_VPS_PATH="$ENV_VPS_OVERRIDE"
          else
            ENV_VPS_PATH="$VPS_PATH/.env"
          fi

          # Subir el example a /tmp del VPS para validar
          scp "$ENV_EXAMPLE" "$USER@$HOST:/tmp/_env_validation_example"

          ssh "$USER@$HOST" bash -se <<EOF
          set -euo pipefail

          if [ ! -f "$ENV_VPS_PATH" ] && ! sudo test -f "$ENV_VPS_PATH"; then
            echo "::error::No existe $ENV_VPS_PATH en el VPS"
            rm -f /tmp/_env_validation_example
            exit 1
          fi

          # Extraer keys REQUERIDAS del example (con valor != vacío después del =)
          # Lógica: VAR=foo → requerida (el example da el valor recomendado)
          #         VAR=    → opcional (el example dice "define si quieres")
          REQUIRED_KEYS=\$(grep -E '^[A-Z_][A-Z0-9_]*=.+' /tmp/_env_validation_example | cut -d= -f1 | sort -u)
          ALL_EXAMPLE_KEYS=\$(grep -E '^[A-Z_][A-Z0-9_]*=' /tmp/_env_validation_example | cut -d= -f1 | sort -u)
          # Extraer keys del .env real (con sudo porque típicamente es 600)
          ENV_KEYS=\$(sudo grep -E '^[A-Z_][A-Z0-9_]*=' "$ENV_VPS_PATH" | cut -d= -f1 | sort -u)

          # Vars REQUERIDAS en example pero NO en real → ERROR
          MISSING_REQUIRED=\$(comm -23 <(echo "\$REQUIRED_KEYS") <(echo "\$ENV_KEYS") || true)
          if [ -n "\$MISSING_REQUIRED" ]; then
            echo "::error::Vars REQUERIDAS del $ENV_EXAMPLE que FALTAN en $ENV_VPS_PATH:"
            echo "\$MISSING_REQUIRED" | sed 's/^/  - /'
            echo "::error::Añade los valores reales en $ENV_VPS_PATH del VPS antes de re-deployar."
            echo "::error::Deploy abortado SIN tocar el container previo (zero downtime en error)."
            rm -f /tmp/_env_validation_example
            exit 1
          fi

          # Vars OPCIONALES (con = vacío en example) que faltan → solo notice
          MISSING_OPTIONAL=\$(comm -23 <(echo "\$ALL_EXAMPLE_KEYS") <(echo "\$ENV_KEYS") | comm -23 - <(echo "\$REQUIRED_KEYS") || true)
          if [ -n "\$MISSING_OPTIONAL" ]; then
            echo "::notice::Vars opcionales del $ENV_EXAMPLE no definidas en $ENV_VPS_PATH (skip):"
            echo "\$MISSING_OPTIONAL" | sed 's/^/  - /'
          fi

          # Vars con placeholders comunes → WARNING (no aborta)
          PLACEHOLDERS=\$(sudo grep -EH '^[A-Z_][A-Z0-9_]*=(change-me|changeme|xxx|XXX|TODO|todo|placeholder|PLACEHOLDER|<.*>|""|'\'\'')$' "$ENV_VPS_PATH" || true)
          if [ -n "\$PLACEHOLDERS" ]; then
            echo "::warning::Vars con valor placeholder en $ENV_VPS_PATH (cambiar en producción):"
            echo "\$PLACEHOLDERS" | sed 's/^/  /'
          fi

          # Vars en real pero no en example → solo informativo
          EXTRA=\$(comm -13 <(echo "\$ALL_EXAMPLE_KEYS") <(echo "\$ENV_KEYS") || true)
          if [ -n "\$EXTRA" ]; then
            echo "::notice::Vars en $ENV_VPS_PATH no documentadas en $ENV_EXAMPLE (legacy o overrides locales):"
            echo "\$EXTRA" | sed 's/^/  - /'
          fi

          echo "✅ Validación .env OK — todas las vars requeridas presentes"
          rm -f /tmp/_env_validation_example
          EOF

      - name: Backup DB pre-migrate (opcional)
        if: ${{ inputs.run_migrations && inputs.backup_before_migrate }}
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          VPS_PATH: ${{ inputs.vps_path }}
          IMAGES_JSON: ${{ needs.resolve.outputs.images_json }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          # Tomar el image_name del primer image para nombrar el dir de backups.
          # (En multi-image todos comparten una DB, así que un solo backup basta.)
          BACKUP_KEY=$(echo "$IMAGES_JSON" | jq -r '.[0].image_name')
          ssh "$USER@$HOST" bash -se <<EOF
          set -euo pipefail
          BACKUP_DIR="/srv/backups/${BACKUP_KEY}"
          sudo mkdir -p "\$BACKUP_DIR"
          STAMP="\$(date -u +%Y%m%d-%H%M%S)"
          cd "${VPS_PATH}"

          # Detectar servicio de DB. Acepta "db", "postgres", o si declarado en compose.
          DB_SVC=""
          for candidate in db postgres; do
            if sudo docker compose -f compose.prod.yml ps "\$candidate" --format json 2>/dev/null | grep -q '"State":"running"'; then
              DB_SVC="\$candidate"; break
            fi
          done

          if [ -z "\$DB_SVC" ]; then
            echo "::notice::No hay servicio db/postgres running en este stack, skip backup"
            exit 0
          fi

          OUT="\$BACKUP_DIR/pre-${VERSION}-\${STAMP}.sql.gz"
          POSTGRES_USER=\$(sudo grep '^POSTGRES_USER=' .env | cut -d= -f2- || echo "postgres")
          POSTGRES_DB=\$(sudo grep '^POSTGRES_DB=' .env | cut -d= -f2- || echo "")

          if [ -n "\$POSTGRES_DB" ]; then
            sudo docker compose -f compose.prod.yml exec -T "\$DB_SVC" \
              pg_dump -U "\$POSTGRES_USER" "\$POSTGRES_DB" | gzip | sudo tee "\$OUT" > /dev/null
          else
            sudo docker compose -f compose.prod.yml exec -T "\$DB_SVC" \
              pg_dumpall -U "\$POSTGRES_USER" | gzip | sudo tee "\$OUT" > /dev/null
          fi

          SIZE=\$(sudo stat -c%s "\$OUT")
          echo "Backup escrito: \$OUT (\$SIZE bytes)"
          if [ "\$SIZE" -lt 1024 ]; then
            echo "::error::Backup vacío (\$SIZE bytes). Abortando deploy."
            sudo rm -f "\$OUT"
            exit 1
          fi

          # Retención 30 días
          sudo find "\$BACKUP_DIR" -maxdepth 1 -name "*.sql.gz" -mtime +30 -delete 2>/dev/null || true
          KEPT=\$(sudo find "\$BACKUP_DIR" -maxdepth 1 -name "*.sql.gz" | wc -l)
          echo "Backups conservados: \$KEPT"
          EOF

      - name: Pull imágenes + (migrate) + up
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.resolve.outputs.version }}
          VERSION_ENV_VAR: ${{ inputs.version_env_var }}
          SERVICES: ${{ needs.resolve.outputs.all_services }}
          CONTAINERS: ${{ needs.resolve.outputs.all_containers }}
          MIGRATE_SERVICE: ${{ needs.resolve.outputs.migrate_service }}
          MIGRATE_COMMAND: ${{ inputs.migrate_command }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
          VPS_PATH: ${{ inputs.vps_path }}
          COMPOSE_FILE: ${{ inputs.compose_file }}
          CHECK_NETWORK: ${{ inputs.check_hubwell_network }}
          KILL_HOST_PORTS: ${{ inputs.kill_host_ports }}
          WAIT_MAX_SECONDS: ${{ inputs.wait_max_seconds }}
          WAIT_GRACE_PERIOD: ${{ inputs.wait_grace_period_seconds }}
          FORBID_DB_SERVICES: ${{ inputs.forbid_db_services }}
        run: |
          ssh "$USER@$HOST" \
            "GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' VERSION='$VERSION' \
             VERSION_ENV_VAR='$VERSION_ENV_VAR' SERVICES='$SERVICES' CONTAINERS='$CONTAINERS' \
             MIGRATE_SERVICE='$MIGRATE_SERVICE' MIGRATE_COMMAND='$MIGRATE_COMMAND' \
             RUN_MIGRATIONS='$RUN_MIGRATIONS' VPS_PATH='$VPS_PATH' COMPOSE_FILE='$COMPOSE_FILE' \
             CHECK_NETWORK='$CHECK_NETWORK' KILL_HOST_PORTS='$KILL_HOST_PORTS' \
             WAIT_MAX_SECONDS='$WAIT_MAX_SECONDS' WAIT_GRACE_PERIOD='$WAIT_GRACE_PERIOD' \
             FORBID_DB_SERVICES='$FORBID_DB_SERVICES' \
             bash -se" <<'EOF'
          set -euo pipefail
          cd "${VPS_PATH}"

          if ! sudo test -f .env; then
            echo "::error::Falta ${VPS_PATH}/.env en el VPS"
            exit 1
          fi

          if [ "${CHECK_NETWORK}" = "true" ]; then
            if ! sudo docker network inspect hubwell_network >/dev/null 2>&1; then
              echo "::error::La red 'hubwell_network' no existe en el VPS."
              exit 1
            fi
          fi

          echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          # Kill host port collisions
          if [ -n "${KILL_HOST_PORTS}" ]; then
            IFS=',' read -ra PORTS <<< "${KILL_HOST_PORTS}"
            for port_spec in "${PORTS[@]}"; do
              port_spec=$(echo "$port_spec" | xargs)
              port_num=$(echo "$port_spec" | rev | cut -d: -f1 | rev)
              echo "▶ Verificando puerto $port_num..."
              COLLIDING=$(sudo docker ps -aq --filter "publish=$port_num" 2>/dev/null || true)
              if [ -n "$COLLIDING" ]; then
                echo "::warning::Containers ocupando puerto $port_num: $COLLIDING — limpiando"
                sudo docker rm -f $COLLIDING 2>&1 | sed 's/^/  /' || true
              fi
            done
          fi

          # Versión previa (para rollback si falla el health gate). El .env aún tiene
          # la versión ANTERIOR — la persistencia de la nueva ocurre tras el up.
          PREV_VERSION=$(sudo grep "^${VERSION_ENV_VAR}=" .env 2>/dev/null | head -1 | cut -d= -f2- || true)

          # GUARDRAIL (forbid_db_services): la BD es EXTERNA; ningún deploy debe
          # gestionar un Postgres. Abortar SIN tocar nada si el compose lo declara.
          if [ "${FORBID_DB_SERVICES:-false}" = "true" ]; then
            PG_SVC=$(sudo docker compose -f "${COMPOSE_FILE}" config --services 2>/dev/null | grep -iE 'postgres' || true)
            if [ -n "${PG_SVC}" ]; then
              echo "::error::GUARDRAIL forbid_db_services: el compose declara servicio(s) Postgres [${PG_SVC}]. La BD es EXTERNA y ningún deploy debe crearla/recrearla. Abortado SIN tocar nada."
              exit 1
            fi
            echo "✅ Guardrail OK: el compose no gestiona ningún Postgres (BD externa)."
          fi

          export ${VERSION_ENV_VAR}="${VERSION}"

          # Pull todas las imágenes del array
          sudo --preserve-env=${VERSION_ENV_VAR} docker compose -f "${COMPOSE_FILE}" pull ${SERVICES}

          # Migrations (en MIGRATE_SERVICE)
          if [ "${RUN_MIGRATIONS}" = "true" ]; then
            echo "▶ Ejecutando migrations en service '${MIGRATE_SERVICE}': ${MIGRATE_COMMAND}"
            sudo --preserve-env=${VERSION_ENV_VAR} docker compose -f "${COMPOSE_FILE}" run --rm --no-deps -T "${MIGRATE_SERVICE}" sh -c "${MIGRATE_COMMAND}" < /dev/null || {
              echo "::error::Migrate falló. NO se subirán las nuevas imágenes."
              exit 1
            }
          fi

          # Up de todos los servicios (--no-deps para no tocar postgres/redis/etc.)
          sudo --preserve-env=${VERSION_ENV_VAR} docker compose -f "${COMPOSE_FILE}" up -d --no-deps --force-recreate --remove-orphans ${SERVICES} < /dev/null

          # Persistir la versión desplegada en el .env del VPS. El `up` de arriba usa
          # la versión vía el `export` (gana sobre el .env), pero si NO la escribimos
          # aquí, el .env queda con el tag ANTERIOR y un `docker compose up` manual
          # posterior (o un operador) revertiría prod a la versión vieja. Idempotente.
          if sudo grep -q "^${VERSION_ENV_VAR}=" .env 2>/dev/null; then
            sudo sed -i "s|^${VERSION_ENV_VAR}=.*|${VERSION_ENV_VAR}=${VERSION}|" .env
          else
            echo "${VERSION_ENV_VAR}=${VERSION}" | sudo tee -a .env >/dev/null
          fi
          echo "✅ ${VERSION_ENV_VAR}=${VERSION} persistido en ${VPS_PATH}/.env"

          # Grace period
          if [ "${WAIT_GRACE_PERIOD}" -gt 0 ]; then
            echo "Grace period: ${WAIT_GRACE_PERIOD}s antes del primer check..."
            sleep "${WAIT_GRACE_PERIOD}"
          fi

          # Wait for ALL containers healthy
          MAX_ITER=$(( ${WAIT_MAX_SECONDS} / 3 ))
          for i in $(seq 1 $MAX_ITER); do
            ALL_OK=true
            STATUS_LINE=""
            for c in ${CONTAINERS}; do
              state=$(sudo docker inspect -f '{{.State.Status}}' "$c" 2>/dev/null || echo "missing")
              health=$(sudo docker inspect -f '{{.State.Health.Status}}' "$c" 2>/dev/null || echo "no-healthcheck")
              STATUS_LINE="${STATUS_LINE}  $c=$state/$health"
              if [ "$state" != "running" ] || { [ "$health" != "healthy" ] && [ "$health" != "no-healthcheck" ]; }; then
                ALL_OK=false
              fi
            done
            echo "wait[$i/$MAX_ITER]${STATUS_LINE}"
            if [ "$ALL_OK" = "true" ]; then
              echo "✅ Todos los containers healthy"
              break
            fi
            if [ "$i" -eq "$MAX_ITER" ]; then
              echo "::error::Containers no llegaron a healthy en ${WAIT_MAX_SECONDS}s"
              for c in ${CONTAINERS}; do
                echo "--- logs de $c (últimas 100) ---"
                sudo docker logs --tail 100 "$c" 2>&1 || true
              done
              # ROLLBACK automático a la versión previa (solo apps; --no-deps NO toca la BD).
              if [ -n "${PREV_VERSION:-}" ] && [ "${PREV_VERSION}" != "${VERSION}" ]; then
                echo "::warning::Health gate falló — ROLLBACK a ${VERSION_ENV_VAR}=${PREV_VERSION}"
                export ${VERSION_ENV_VAR}="${PREV_VERSION}"
                sudo --preserve-env=${VERSION_ENV_VAR} docker compose -f "${COMPOSE_FILE}" pull ${SERVICES} 2>&1 | tail -3 || true
                sudo --preserve-env=${VERSION_ENV_VAR} docker compose -f "${COMPOSE_FILE}" up -d --no-deps --force-recreate ${SERVICES} < /dev/null 2>&1 | tail -5 || true
                sudo sed -i "s|^${VERSION_ENV_VAR}=.*|${VERSION_ENV_VAR}=${PREV_VERSION}|" .env 2>/dev/null || true
                echo "::error::Deploy falló el health gate; se hizo ROLLBACK a ${PREV_VERSION}. Revisar logs."
              else
                echo "::error::Deploy falló y no hay versión previa válida para rollback."
              fi
              exit 1
            fi
            sleep 3
          done

          sudo docker image prune -f
          EOF

      - name: Smoke test público
        if: ${{ inputs.smoke_test_mode == 'public' }}
        env:
          HEALTH_URL: ${{ inputs.health_url }}
          EXTRA_URLS: ${{ inputs.smoke_urls }}
        run: |
          set -e
          # Construir lista: health_url + smoke_urls (coma-separadas)
          URLS=("$HEALTH_URL")
          if [ -n "$EXTRA_URLS" ]; then
            IFS=',' read -ra EXTRAS <<< "$EXTRA_URLS"
            for u in "${EXTRAS[@]}"; do
              URLS+=("$(echo "$u" | xargs)")
            done
          fi

          FAILED=()
          for url in "${URLS[@]}"; do
            ok=false
            for i in 1 2 3 4 5 6; do
              code=$(curl -fsS -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
              if echo "$code" | grep -q "^[23]"; then
                echo "✅ $url OK (HTTP $code)"
                ok=true; break
              fi
              echo "intento $i para $url: HTTP $code, reintentando..."
              sleep 10
            done
            if [ "$ok" != "true" ]; then
              FAILED+=("$url")
            fi
          done

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::Smoke fallido en: ${FAILED[*]}"
            exit 1
          fi

      - name: Smoke test interno (red docker)
        if: ${{ inputs.smoke_test_mode == 'internal' }}
        env:
          HOST: ${{ secrets.PROD_HOST }}
          USER: ${{ secrets.PROD_USER }}
          INTERNAL_URL: ${{ inputs.smoke_internal_url }}
          NETWORK: ${{ inputs.smoke_internal_network }}
        run: |
          if [ -z "$INTERNAL_URL" ]; then
            echo "::error::smoke_test_mode=internal requiere smoke_internal_url"
            exit 1
          fi
          ssh "$USER@$HOST" "sudo docker run --rm --network $NETWORK curlimages/curl:8.9.1 -fsS '$INTERNAL_URL'"

      - name: Resumen
        if: always()
        env:
          STATUS: ${{ job.status }}
          VERSION: ${{ needs.resolve.outputs.version }}
          IMAGES_JSON: ${{ needs.resolve.outputs.images_json }}
          HEALTH: ${{ inputs.health_url }}
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Images**:" >> $GITHUB_STEP_SUMMARY
          echo "$IMAGES_JSON" | jq -r '.[] | "  - `\(.image_name)` → service `\(.service_name)` → container `\(.container_name)`"' >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: $HEALTH" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notificar Telegram
    needs: [resolve, deploy]
    if: always() && (success() || failure())
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        env:
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ needs.deploy.result }}
          VERSION: ${{ needs.resolve.outputs.version }}
          IMAGES_JSON: ${{ needs.resolve.outputs.images_json }}
          HEALTH: ${{ inputs.health_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          set -e
          if [ -z "$BOT" ] || [ -z "$CHAT" ]; then
            echo "Telegram secrets no configurados, skip notificación."
            exit 0
          fi
          # Lista de imágenes para el mensaje
          IMAGES_LIST=$(echo "$IMAGES_JSON" | jq -r '[.[].image_name] | join(", ")')
          if [ "$STATUS" = "success" ]; then
            EMOJI="🚀"
            STATUS_TEXT="✅ success"
          else
            EMOJI="🔥"
            STATUS_TEXT="❌ failed"
          fi
          MSG="$EMOJI *Deploy → prod*%0A%0A*Images*: ${IMAGES_LIST}%0A*Version*: \`${VERSION}\`%0A*URL*: ${HEALTH}%0A*Status*: ${STATUS_TEXT}%0A*Por*: @${ACTOR}%0A%0A[Ver run](https://github.com/${REPO}/actions/runs/${RUN_ID})"
          curl -fsS "https://api.telegram.org/bot${BOT}/sendMessage" \
            -d "chat_id=${CHAT}" \
            -d "parse_mode=Markdown" \
            -d "text=${MSG}" > /dev/null
